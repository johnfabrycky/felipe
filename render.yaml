services:
  - type: web
    name: kss-discord-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: RENDER_SERVICE_ID
        sync: FALSE
      - key: RENDER_API_KEY
        sync: FALSE
      - key: DISCORD_TOKEN
        sync: FALSE
      - key: SUPABASE_RULE
        sync: FALSE
      - key: SUPABASE_SERVICE_KEY
        sync: FALSE
      - key: HEALTHCHECK_URL
        sync: FALSE
